services:
  postgres:
    image: postgres:16-alpine
    container_name: warungpos-db
    environment:
      POSTGRES_USER: posuser
      POSTGRES_PASSWORD: pospass
      POSTGRES_DB: warungpos
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posuser -d warungpos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
